# === notification-service ===
quarkus.http.port=8083
quarkus.application.name=notification-service
# DataSource (à adapter par environnement)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:notification_service}
# PINFO-211: production must fail-fast if DB_PASSWORD is unset (no
# fallback secret in the committed config); %dev keeps the well-known
# value so `mvn quarkus:dev` and docker-compose still work locally.
quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.password=notification_service_pwd
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5436/notifications_db}
# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
# Log
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
# Mailer (Mailtrap SMTP)
quarkus.mailer.from=noreply@unigevents.ch
quarkus.mailer.host=sandbox.smtp.mailtrap.io
quarkus.mailer.port=${MAILTRAP_PORT:2525}
quarkus.mailer.username=${MAILTRAP_USERNAME}
quarkus.mailer.password=${MAILTRAP_PASSWORD}
quarkus.mailer.tls=false
quarkus.mailer.start-tls=OPTIONAL
%dev.quarkus.mailer.mock=true
# Health + Prometheus metrics (auto-exposed at /q/health/{live,ready} and /q/metrics)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
# JWT / Auth0
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://api.unigevents.ch
mp.jwt.token.header=Authorization
smallrye.jwt.path.groups=https://unigevents.com/roles
# Kafka
quarkus.messaging.health.enabled=false
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.registration-waitlisted.connector=smallrye-kafka
mp.messaging.incoming.registration-waitlisted.topic=registration.waitlisted
mp.messaging.incoming.registration-waitlisted.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.registration-waitlisted.group.id=notification-service
mp.messaging.incoming.registration-cancelled.connector=smallrye-kafka
mp.messaging.incoming.registration-cancelled.topic=registration.cancelled
mp.messaging.incoming.registration-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.registration-cancelled.group.id=notification-service
mp.messaging.incoming.registration-confirmed.connector=smallrye-kafka
mp.messaging.incoming.registration-confirmed.topic=registration.confirmed
mp.messaging.incoming.registration-confirmed.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.registration-confirmed.group.id=notification-service
mp.messaging.incoming.event-updated.connector=smallrye-kafka
mp.messaging.incoming.event-updated.topic=event.updated
mp.messaging.incoming.event-updated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-updated.group.id=notification-service
mp.messaging.incoming.event-cancelled.connector=smallrye-kafka
mp.messaging.incoming.event-cancelled.topic=event.cancelled
mp.messaging.incoming.event-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-cancelled.group.id=notification-service
mp.messaging.incoming.announcement-posted.connector=smallrye-kafka
mp.messaging.incoming.announcement-posted.topic=announcement.posted
mp.messaging.incoming.announcement-posted.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.announcement-posted.group.id=notification-service
# REST Clients
quarkus.rest-client.registration-service.url=http://registration-service:8086
quarkus.rest-client.user-service.url=http://user-service:8081
quarkus.rest-client.event-service.url=http://event-service:8082
# Internal service key
internal.service.key=${INTERNAL_SERVICE_KEY}
# Test configs
%test.quarkus.kafka.devservices.enabled=true
%test.kafka.bootstrap.servers=localhost:9092
