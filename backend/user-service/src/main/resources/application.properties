# === user-service ===
quarkus.http.port=8081
quarkus.application.name=user-service
# DataSource (à adapter par environnement)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:user_service}
# PINFO-211: production must fail-fast if DB_PASSWORD is unset (no
# fallback secret in the committed config); %dev keeps the well-known
# value so `mvn quarkus:dev` and docker-compose still work locally.
quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.password=user_service_pwd
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/users_db}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${USER_DB_HOST:localhost}:${USER_DB_PORT:5433}/users_db
# Hibernate
# PINFO-195: dev/test still uses `update` so contributors don't need to write
# a migration for every entity tweak during local iteration. The %prod profile
# below switches to `validate` and lets Flyway own all schema changes.
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
# ────────────────────────────────────────────────────────────────────────────
# PINFO-195 — production profile.
#
# In prod, Hibernate must NOT mutate the schema on its own. Any change to an
# entity (field added, type changed, column renamed) must land as a numbered
# Flyway migration that can be reviewed, replayed and rolled back. We:
#   - run Flyway at startup (`migrate-at-start`) so the cluster is always at
#     the head migration before the app accepts traffic,
#   - tell Hibernate to only `validate` that the schema matches the entities,
#     and fail fast if it doesn't,
#   - use `baseline-on-migrate` so a Postgres that already carries the
#     pre-Flyway schema (i.e. every existing prod DB created by Hibernate's
#     `update`) is recognised as being "at baseline" instead of refusing to
#     start because Flyway sees a non-empty schema with no flyway_schema_history.
# Migrations live in src/main/resources/db/migration/V<N>__<description>.sql.
# See docs/MIGRATIONS.md for the workflow when adding a new one.
# ────────────────────────────────────────────────────────────────────────────
%prod.quarkus.hibernate-orm.database.generation=validate
%prod.quarkus.flyway.migrate-at-start=true
%prod.quarkus.flyway.baseline-on-migrate=true
%prod.quarkus.flyway.baseline-version=1
%prod.quarkus.flyway.baseline-description=Pre-Flyway baseline (captured in V1__init_users_table.sql)
# Log
quarkus.log.level=INFO
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://api.unigevents.ch
#quarkus.http.auth.permission.authenticated.paths=/api/*
#quarkus.http.auth.permission.authenticated.policy=authenticated
mp.jwt.token.header=Authorization
# smallrye.jwt.path.groups is intentionally absent: the claim name contains slashes
# which SmallRye mis-parses as a JSON path. The shared JwtRolesAugmentor in
# commons-security reads the namespaced claim directly instead.
quarkus.log.category."io.smallrye.jwt".level=INFO
quarkus.smallrye-openapi.path=/openapi
internal.service.key=${INTERNAL_SERVICE_KEY:unigevents-internal-secret}
# PINFO-210: CORS is intentionally OFF outside dev. In prod the browser
# only ever talks to Cloudflare → Kong → backend on a single origin, so
# the backend should never receive a cross-origin request. Quarkus
# defaults `quarkus.http.cors` to false, but we set %prod explicitly so
# an accidental fallback to the dev profile in production cannot reopen
# a localhost origin to attackers.
%prod.quarkus.http.cors=false
# Dev CORS for frontend local server (only when Vite proxy is bypassed —
# the proxy makes everything same-origin via localhost:5173, so this
# block is rarely needed but stays as a safety net for direct browser
# calls from a dev tool).
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173
%dev.quarkus.http.cors.methods=GET,PUT,POST,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=Authorization,Content-Type,Accept
# Health + Prometheus metrics (auto-exposed at /q/health/{live,ready} and /q/metrics)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
# ============================================================
# User Service — Quarkus Configuration
# ============================================================
# Application
quarkus.application.version=1.0.0
# HTTP
quarkus.http.host=0.0.0.0
# Database (PostgreSQL)
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=8
# Hibernate ORM
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.log.bind-parameters=true
# Logging
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
# OIDC / Auth0
quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:https://dev-cy8uphtpfx5bdclo.us.auth0.com/}
quarkus.oidc.client-id=${QUARKUS_OIDC_CLIENT_ID:}
quarkus.oidc.credentials.secret=${QUARKUS_OIDC_CLIENT_SECRET:}
# Auth0 Management API (M2M) — used by Auth0ManagementService to hard-delete users.
# Create a Machine-to-Machine application in the Auth0 Dashboard, grant it the
# "delete:users" permission on the "Auth0 Management API", then set these two vars.
# If unset, account deletion falls back to local soft-delete only (dev behaviour).
auth0.management.domain=dev-cy8uphtpfx5bdclo.us.auth0.com
auth0.management.client-id=${AUTH0_MGMT_CLIENT_ID:}
auth0.management.client-secret=${AUTH0_MGMT_CLIENT_SECRET:}
# OpenAPI / Swagger
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.path=/q/swagger-ui
# Development mode
%dev.quarkus.log.level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=true
# Production mode
%prod.quarkus.log.level=INFO
%prod.quarkus.hibernate-orm.log.sql=false
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.out-of-order=false
# PINFO-205: NE PAS activer CamelCaseToUnderscoresNamingStrategy ici. La base
# de prod existante (créée par Hibernate `update` sans cette stratégie) et le
# baseline V1__init_users_table.sql utilisent les noms PG-folded sans
# underscore (`auth0id`, `avatarurl`, `createdat`, `degreelevel`). Activer la
# stratégie ferait chercher à Hibernate `auth0_id` etc. -> validate échoue ->
# le pod ne devient jamais Ready -> rollout timeout. Si on veut migrer vers
# snake_case un jour, il faudra une migration Flyway dédiée qui RENAME les
# colonnes ET mettre à jour V1 en parallèle.
