# Test Profile Configuration
quarkus.profile=test
# Avoid HTTP port conflicts during tests
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0
# Use Kafka Companion bootstrap servers for test publishers
mp.messaging.outgoing.event-created.bootstrap.servers=${kafka.bootstrap.servers}
mp.messaging.outgoing.event-updated.bootstrap.servers=${kafka.bootstrap.servers}
mp.messaging.outgoing.event-cancelled.bootstrap.servers=${kafka.bootstrap.servers}
# Use H2 in-memory database for tests
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=
# Fresh schema per test run
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Suppress Kafka warnings in test output
quarkus.log.level=INFO
quarkus.log.category."io.smallrye.reactive.messaging.kafka".level=WARN
