# === registration-service ===
quarkus.http.port=8084
quarkus.http.test-port=0
quarkus.application.name=registration-service

# --- DataSource (Configuration par défaut) ---
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER:registration_user}
%prod.quarkus.datasource.password=${DB_PASSWORD:registration_pwd}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${REGISTRATION_DB_HOST:localhost}:${REGISTRATION_DB_PORT:5435}/registrations_db
%prod.quarkus.hibernate-orm.database.generation=update

# La configuration de test (On s'assure qu'elle est bien isolée)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.driver=org.h2.Driver
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:registration_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
# --- Hibernate ---
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# --- Sécurité JWT ---
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://api.unigevents.ch

# --- REST Clients (URLs vers les autres microservices) ---
# Ces clés doivent correspondre au package/nom de tes interfaces @RegisterRestClient
ch.unige.pinfo.registration.client.EventServiceClient/mp-rest/url=${EVENT_SERVICE_URL:http://localhost:8082}
ch.unige.pinfo.registration.client.UserServiceClient/mp-rest/url=${USER_SERVICE_URL:http://localhost:8081}

# --- Kafka Messaging (Registration Events) ---
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

# Outgoing: Notifications quand une inscription change d'état
mp.messaging.outgoing.registration-events.connector=smallrye-kafka
mp.messaging.outgoing.registration-events.topic=registration.events
mp.messaging.outgoing.registration-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Incoming: Écouter quand un événement est annulé dans Event-Service pour gérer la waitlist/remboursement
mp.messaging.incoming.event-cancelled.connector=smallrye-kafka
mp.messaging.incoming.event-cancelled.topic=event.cancelled
mp.messaging.incoming.event-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Force H2 pour les tests (écrase tout le reste)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:registration_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect

# Désactiver Kafka pour éviter les timeouts au démarrage des tests
%test.quarkus.kafka.devservices.enabled=false
%test.mp.messaging.outgoing.registration-events.connector=smallrye-in-memory
%test.mp.messaging.incoming.event-cancelled.connector=smallrye-in-memory