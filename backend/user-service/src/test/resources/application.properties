quarkus.oidc.enabled=false
quarkus.security.auth.enabled-in-dev-mode=false
quarkus.http.test-port=0
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.jacoco.enabled=true
quarkus.jacoco.reuse-data-file=true
internal.service.key=test-internal-key
# PR #193 : la nouvelle classe UserEventPublisher déclare un channel Kafka
# outgoing "organizer-upsert-out". Sans devservices, Quarkus ne peut pas
# construire l'Emitter au démarrage du contexte de test → "Failed to start
# quarkus". On laisse Quarkus démarrer un broker éphémère via Testcontainers.
quarkus.kafka.devservices.enabled=true
# Dummy Cloudinary settings so CloudinarySignatureService is "configured" in
# tests (the real values come from Doppler in deployed envs). The rate-limit
# max is intentionally small so the 429 path is cheap to exercise.
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-api-key
cloudinary.api-secret=test-api-secret
cloudinary.upload-preset=unigevents_profil
cloudinary.avatar.rate-limit.max=3
cloudinary.avatar.rate-limit.window-seconds=3600