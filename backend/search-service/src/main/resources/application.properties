# === search-service ===
quarkus.http.port=8085
quarkus.application.name=search-service
# =====================================================
# DATABASE (shared config)
# =====================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:search_service}
# PINFO-211: production must fail-fast if DB_PASSWORD is unset (no committed
# fallback secret in the tree); %dev keeps the well-known value for local runs
# and docker-compose. The %test profile resolves it the same way (see below).
quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.password=search_service_pwd
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.hibernate-orm.log.sql=false
# PROD schema strategy
quarkus.hibernate-orm.database.generation=update
# DEV profile — pointe vers le conteneur search-db du docker-compose
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://search-db:5432/search_db
%dev.quarkus.datasource.password=search_service_pwd
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
# =====================================================
# TEST PROFILE (IMPORTANT FIX)
# =====================================================
%test.quarkus.datasource.devservices.enabled=true
# Tests read the password from DB_PASSWORD (set by CI to match the CI Postgres),
# with a local fallback so tests still start off-CI. This mirrors the previous
# committed default but as a %test override, so prod (unprefixed) still fails fast.
%test.quarkus.datasource.password=${DB_PASSWORD:search_service_pwd}
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Disable external Kafka in tests
%test.quarkus.kafka.devservices.enabled=true
# =====================================================
# REST CLIENTS
# =====================================================
quarkus.rest-client.event-service.url=http://event-service:8082
quarkus.rest-client.user-service.url=http://user-service:8081
# =====================================================
# LOGGING / OPENAPI / METRICS
# =====================================================
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
quarkus.log.category."io.smallrye.jwt".level=DEBUG
# =====================================================
# JWT
# =====================================================
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://user-service.unigevents.com
mp.jwt.token.header=Authorization
# =====================================================
# KAFKA (PROD ONLY)
# =====================================================
%prod.kafka.bootstrap.servers=kafka:9092
mp.messaging.outgoing.registration-confirmed.connector=smallrye-kafka
mp.messaging.outgoing.registration-confirmed.topic=registration.confirmed
mp.messaging.outgoing.registration-confirmed.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.registration-waitlisted.connector=smallrye-kafka
mp.messaging.outgoing.registration-waitlisted.topic=registration.waitlisted
mp.messaging.outgoing.registration-waitlisted.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.registration-cancelled.connector=smallrye-kafka
mp.messaging.outgoing.registration-cancelled.topic=registration.cancelled
mp.messaging.outgoing.registration-cancelled.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.event-cancelled.connector=smallrye-kafka
mp.messaging.incoming.event-cancelled.topic=event.cancelled
mp.messaging.incoming.event-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-cancelled.group.id=registration-service
%test.kafka.bootstrap.servers=localhost:9092
