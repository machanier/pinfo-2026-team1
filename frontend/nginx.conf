server {
    # PINFO-180: nginx-unprivileged runs as UID 101 and cannot bind
    # ports <1024. The container exposes 8080; the K8s Service still
    # publishes 80 and forwards to targetPort 8080.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PINFO-188 — security headers
    # `always` is mandatory: without it nginx skips add_header on non-2xx
    # responses, so error pages (401/404/500) would ship without CSP and
    # X-Frame-Options.
    #
    # CSP scope today (PINFO-188 + PINFO-190): SPA talks to its own
    # origin (frontend nginx → /api/* via the in-cluster Ingress, same
    # hostname behind the Cloudflare Tunnel) AND to https://*.auth0.com
    # for the OIDC token endpoint + silent-auth iframe used by
    # @auth0/auth0-react under cacheLocation:'memory' +
    # useRefreshTokens. connect-src covers the XHRs to /oauth/token,
    # frame-src covers the hidden iframe Auth0 mounts during silent
    # auth. frame-ancestors stays 'none' — Auth0 must not be allowed
    # to embed our SPA, only the other way around.
    # style-src keeps 'unsafe-inline' because Vite emits one inline
    # <style> for CSS code-splitting; tightening to a hash is tracked
    # separately and not in scope here.
    #
    # HSTS lives on Cloudflare, not here: TLS terminates on the edge,
    # nginx only ever sees HTTP, and the VPN-only debug path on the
    # VM IP has no certificate — emitting Strict-Transport-Security
    # from nginx would either be a no-op (browsers ignore HSTS over
    # plain HTTP) or, worse, brick that fallback path.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.auth0.com; frame-src https://*.auth0.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SPA routing — any path that doesn't match a real file
    # is redirected to index.html (React Router handles the rest)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively. Re-emit the security headers in
    # this location: nginx's `add_header` does NOT inherit from the
    # parent server block once a child block defines its own
    # add_header — silently dropping CSP on every JS/CSS/image. The
    # Cache-Control line below would otherwise replace, not add to,
    # the parent headers.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.auth0.com; frame-src https://*.auth0.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}
