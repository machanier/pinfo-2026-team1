# === event-service ===
quarkus.http.port=8082
quarkus.application.name=event-service
# DataSource (à adapter par environnement)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:event_service}
# PINFO-211: production must fail-fast if DB_PASSWORD is unset (no
# fallback secret in the committed config); %dev keeps the well-known
# value so `mvn quarkus:dev` and docker-compose still work locally.
quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.password=event_service_pwd
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5434/events_db}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${EVENT_DB_HOST:localhost}:${EVENT_DB_PORT:5434}/events_db
# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.log.sql=false
# Log
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
# Health + Prometheus metrics (auto-exposed at /q/health/{live,ready} and /q/metrics)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
# PINFO-199 / PINFO-202: désactive la contribution du connecteur Kafka aux
# probes /q/health/{ready,live}. Initialement ajouté quand aucun broker
# n'existait en k8s (sans le flag, le pod ne devenait jamais Ready et le
# rollout timeout). Depuis PINFO-202 un broker Kafka tourne dans
# k8s/kafka/, donc la raison historique a disparu — mais on garde le flag
# *intentionnellement* pour découpler la santé du service de celle de Kafka.
#
# Justification : les channels event-{created,updated,cancelled} ne sont
# PAS dans le chemin critique des requêtes /api/* — ils sont émis en
# fire-and-forget après un commit DB synchrone. Si Kafka a un hoquet
# temporaire (rolling restart, OOM, etc.), on ne veut PAS que les
# requêtes API authentifiées commencent à 503. Sans ce flag, le messaging
# health check rapporte DOWN dès que la connexion Kafka échoue, le pod
# devient Ready=False, k8s coupe le trafic, et un problème async devient
# un incident utilisateur. Avec le flag, les `Emitter.send` échouent
# silencieusement en async et le service continue de servir HTTP.
#
# Property name source: https://quarkus.io/guides/smallrye-health
# `quarkus.messaging.kafka.health.readiness.enabled` (la première version
# qu'on avait essayée) n'existe pas — Quarkus l'ignore en silence. La bonne
# propriété est `quarkus.messaging.health.enabled` (globale) ou
# `quarkus.messaging.health.<channel>.readiness.enabled` (per-channel).
quarkus.messaging.health.enabled=false
# Internal service-to-service key (validated by InternalSecurityFilter on /internal/*,
# also sent on outgoing calls). No committed fallback: prod must inject
# INTERNAL_SERVICE_KEY or the service fails fast — same pattern as DB_PASSWORD (PINFO-211).
# Kong never forwards /internal/*, so this is pod-to-pod defence in depth. %dev provides
# a shared local value so dev/docker internal calls still authenticate.
internal.service.key=${INTERNAL_SERVICE_KEY}
%dev.internal.service.key=unigevents-dev-internal-key
# JWT / Auth0
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://api.unigevents.ch
mp.jwt.token.header=Authorization
# NOTE: smallrye.jwt.path.groups intentionally absent — the namespaced claim
# "https://unigevents.com/roles" contains slashes that SmallRye misparses as a
# JSON Pointer. The shared JwtRolesAugmentor in commons-security reads the
# claim directly instead.
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# Event Service Kafka Topics
mp.messaging.outgoing.event-created.connector=smallrye-kafka
mp.messaging.outgoing.event-created.topic=event.created
mp.messaging.outgoing.event-created.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-created.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.outgoing.event-updated.connector=smallrye-kafka
mp.messaging.outgoing.event-updated.topic=event.updated
mp.messaging.outgoing.event-updated.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-updated.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.outgoing.event-cancelled.connector=smallrye-kafka
mp.messaging.outgoing.event-cancelled.topic=event.cancelled
mp.messaging.outgoing.event-cancelled.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-cancelled.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# Event submitted for moderation pipeline
mp.messaging.outgoing.event-submitted.connector=smallrye-kafka
mp.messaging.outgoing.event-submitted.topic=event.submitted
mp.messaging.outgoing.event-submitted.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-submitted.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# Event moderation decision (APPROVED/REJECTED)
mp.messaging.incoming.event-moderated.connector=smallrye-kafka
mp.messaging.incoming.event-moderated.topic=event.moderated
mp.messaging.incoming.event-moderated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-moderated.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.incoming.event-moderated.group.id=event-service
mp.messaging.incoming.event-flagged.connector=smallrye-kafka
mp.messaging.incoming.event-flagged.topic=event.flagged
mp.messaging.incoming.event-flagged.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-flagged.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.incoming.event-flagged.group.id=event-service
mp.messaging.incoming.announcement-moderated.connector=smallrye-kafka
mp.messaging.incoming.announcement-moderated.topic=announcement.moderated
mp.messaging.incoming.announcement-moderated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.announcement-moderated.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.incoming.announcement-moderated.group.id=event-service
# Announcement submitted when an organizer posts (moderation pipeline)
mp.messaging.outgoing.announcement-submitted.connector=smallrye-kafka
mp.messaging.outgoing.announcement-submitted.topic=announcement.submitted
mp.messaging.outgoing.announcement-submitted.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.announcement-submitted.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# Announcement published after moderation approval
mp.messaging.outgoing.announcement-posted.connector=smallrye-kafka
mp.messaging.outgoing.announcement-posted.topic=announcement.posted
mp.messaging.outgoing.announcement-posted.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.announcement-posted.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# Registration Service Kafka Topics (incoming — maintains confirmed-registration count projection)
mp.messaging.incoming.registration-confirmed.connector=smallrye-kafka
mp.messaging.incoming.registration-confirmed.topic=registration.confirmed
mp.messaging.incoming.registration-confirmed.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.registration-confirmed.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.incoming.registration-confirmed.group.id=event-service
mp.messaging.incoming.registration-cancelled.connector=smallrye-kafka
mp.messaging.incoming.registration-cancelled.topic=registration.cancelled
mp.messaging.incoming.registration-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.registration-cancelled.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
mp.messaging.incoming.registration-cancelled.group.id=event-service
# Suppress Kafka noise in dev (no broker locally) — channels stay wired but logs are silenced
%dev.quarkus.log.category."io.smallrye.reactive.messaging.kafka".level=OFF
%dev.quarkus.log.category."org.apache.kafka".level=OFF
# ────────────────────────────────────────────────────────────────────────────
# Cloudinary signed BANNER uploads (PINFO-228 — moved here from user-service).
# Beans (CloudinarySignatureService, AvatarUploadRateLimiter) come from the
# shared commons-cloudinary module; we just inject the credentials. The
# api-secret lives ONLY in env vars (Doppler in dev, Secret k8s in prod) — no
# committed fallback. Empty values resolve to Optional.empty() in
# CloudinarySignatureService and the banner-signature endpoint answers 503
# instead of crashing the JVM (see CloudinaryUnconfiguredBootTest).
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.banner-upload-preset=${CLOUDINARY_BANNER_UPLOAD_PRESET:}
# Per-user signature-mint rate limit. The shared AvatarUploadRateLimiter is
# keyed here by `banner:<jwt-subject>` so the banner budget is independent of
# any avatar budget in user-service.
cloudinary.avatar.rate-limit.max=${CLOUDINARY_AVATAR_RATE_LIMIT_MAX:10}
cloudinary.avatar.rate-limit.window-seconds=${CLOUDINARY_AVATAR_RATE_LIMIT_WINDOW_SECONDS:3600}
