# ──────────────────────────────────────────
# Configuration base de données (PostgreSQL)
# ──────────────────────────────────────────
# Ces valeurs sont utilisées en développement local avec Docker.
# En production elles seront remplacées par des variables d'environnement.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:unigEvents}

# ──────────────────────────────────────────
# Hibernate ORM
# ──────────────────────────────────────────
# drop-and-create : recrée le schéma à chaque démarrage (pratique en dev)
# validate        : vérifie juste que le schéma correspond (pour la prod)
quarkus.hibernate-orm.database.generation=drop-and-create

# ──────────────────────────────────────────
# OpenAPI / Swagger UI
# ──────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
