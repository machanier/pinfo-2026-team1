openapi: 3.0.3
info:
  title: Search Service
  description: >
    Provides full-text search and faceted filtering for events and organizer
    profiles. Maintains a denormalized read index using PostgreSQL with the
    pg_trgm extension. All endpoints are read-only and publicly accessible.

    The index is kept up to date by consuming Kafka events:
      - event.created → index new event
      - event.updated → re-index event with updated snapshot
      - event.cancelled → remove event from index
  version: 1.0.0

servers:
  - url: http://localhost:8085
    description: Local development

tags:
  - name: Events
    description: Full-text search and filtering for events
  - name: Organizers
    description: Search organizer and association profiles

paths:

  /api/search/events:
    get:
      tags: [Events]
      summary: Full-text search and filter events
      description: >
        Combines free-text search on title, description, and tags with
        structured filters. Always returns PUBLISHED events only.
        Returns results alongside facet counts for building a filter sidebar UI.
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: >
            Free-text search query. Matched against event title, description,
            and tags using pg_trgm fuzzy matching.
        - name: category
          in: query
          schema:
            type: string
          description: Comma-separated list of categories to filter by
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
          description: Filter events starting on or after this date (YYYY-MM-DD)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
          description: Filter events starting on or before this date (YYYY-MM-DD)
        - name: place
          in: query
          schema:
            type: string
          description: Partial match filter on location string
        - name: organizerId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by a specific organizer
        - name: faculty
          in: query
          schema:
            type: string
          description: >
            Return events open to this faculty, plus events with no
            faculty restriction.
        - name: degreeLevel
          in: query
          schema:
            type: string
            enum: [BACHELOR, MASTER, PHD]
          description: >
            Return events open to this degree level, plus events with no
            degree level restriction.
        - name: hasAvailableSlots
          in: query
          schema:
            type: boolean
          description: If true, exclude events that are full
        - name: sort
          in: query
          schema:
            type: string
            enum: [date_asc, date_desc, relevance]
            default: date_asc
          description: >
            Sort order. relevance is only meaningful when a query string (q)
            is provided — falls back to date_asc if q is absent.
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated search results with facet counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSearchResult'

  /api/search/events/suggestions:
    get:
      tags: [Events]
      summary: Autocomplete suggestions for the search bar
      description: >
        Returns up to 8 title and tag suggestions matching the partial query
        string. Intended to power a dropdown as the user types.
        Minimum 2 characters required.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Partial search string (minimum 2 characters)
        - name: limit
          in: query
          schema:
            type: integer
            default: 8
            maximum: 8
      responses:
        '200':
          description: List of autocomplete suggestion strings
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      type: string
                    maxItems: 8
        '400':
          description: Query string is too short (minimum 2 characters)

  /api/search/organizers:
    get:
      tags: [Organizers]
      summary: Search organizer and association profiles
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Free-text search on association name and description
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated organizer search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizerSearchResult'

# ── COMPONENTS ────────────────────────────────────────────────────────────────

components:
  schemas:

    EligibilityRuleSummary:
      type: object
      nullable: true
      description: Simplified eligibility rules for display in search results
      properties:
        faculties:
          type: array
          items:
            type: string
        majors:
          type: array
          items:
            type: string
        degreeLevels:
          type: array
          items:
            type: string
            enum: [BACHELOR, MASTER, PHD]

    EventSearchHit:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        place:
          type: string
        time:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        organizerId:
          type: string
          format: uuid
        organizerName:
          type: string
        capacity:
          type: integer
          nullable: true
        registeredCount:
          type: integer
        availableSlots:
          type: integer
          nullable: true
        isFull:
          type: boolean
        restrictedTo:
          $ref: '#/components/schemas/EligibilityRuleSummary'

    FacetBucket:
      type: object
      description: A single value and its result count, used to build filter UI
      properties:
        value:
          type: string
        count:
          type: integer

    Facets:
      type: object
      description: >
        Aggregated counts per filter dimension. Counts reflect the current
        query — applying an existing filter will reduce the counts accordingly.
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/FacetBucket'
        places:
          type: array
          items:
            $ref: '#/components/schemas/FacetBucket'
        degreeLevels:
          type: array
          items:
            $ref: '#/components/schemas/FacetBucket'

    EventSearchResult:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EventSearchHit'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        facets:
          $ref: '#/components/schemas/Facets'

    OrganizerSearchHit:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        associationName:
          type: string
        description:
          type: string
        logoUrl:
          type: string
          format: uri
          nullable: true
        verified:
          type: boolean
        upcomingEventCount:
          type: integer

    OrganizerSearchResult:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrganizerSearchHit'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
