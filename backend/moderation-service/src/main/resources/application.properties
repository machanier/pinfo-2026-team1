quarkus.http.port=8084
quarkus.application.name=moderation-service
# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:moderation_service}
quarkus.datasource.password=${DB_PASSWORD:moderation_service_pwd}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://moderation-db:5432/moderation_db}
# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
# Log
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
# Health + Prometheus metrics (auto-exposed at /q/health/{live,ready} and /q/metrics)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
# langchain4j
quarkus.langchain4j.ollama.chat-model.model-id=mistral
quarkus.langchain4j.ollama.chat-model.temperature=0
#quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.base-url=http://10.25.10.137:11434
# On définit un temps  timeout
quarkus.langchain4j.ollama.timeout=60s
# Consommateur Kafka
mp.messaging.incoming.event-created.bootstrap.servers=kafka:9092
mp.messaging.incoming.event-created.connector=smallrye-kafka
mp.messaging.incoming.event-created.topic=event-created
mp.messaging.incoming.event-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-created.group.id=moderation-service
#%dev.mp.messaging.incoming.event-created.bootstrap.servers=
%dev.kafka.bootstrap.servers=kafka:9092