_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service:8081
    routes:
      - name: user-route
        paths:
          - /api/users
        strip_path: false
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: iss
          claims_to_verify:
            - exp

