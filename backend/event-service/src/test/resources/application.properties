# === event-service ===
quarkus.http.port=8082
quarkus.application.name=event-service
# DataSource (à adapter par environnement)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:event_service}
quarkus.datasource.password=${DB_PASSWORD:event_service_pwd}
quarkus.datasource.jdbc.url=jdbc:postgresql://${EVENT_DB_HOST:event-db}:${EVENT_DB_PORT:5432}/events_db
# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.log.sql=false
# Log
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://event-service.unigevents.com
mp.jwt.token.header=Authorization
quarkus.log.category."io.smallrye.jwt".level=DEBUG
kafka.bootstrap.servers=kafka:9092
# Event Service Kafka Topics
mp.messaging.outgoing.event-created.connector=smallrye-kafka
mp.messaging.outgoing.event-created.topic=event.created
mp.messaging.outgoing.event-created.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-created.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
mp.messaging.outgoing.event-updated.connector=smallrye-kafka
mp.messaging.outgoing.event-updated.topic=event.updated
mp.messaging.outgoing.event-updated.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-updated.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
mp.messaging.outgoing.event-cancelled.connector=smallrye-kafka
mp.messaging.outgoing.event-cancelled.topic=event.cancelled
mp.messaging.outgoing.event-cancelled.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.event-cancelled.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}