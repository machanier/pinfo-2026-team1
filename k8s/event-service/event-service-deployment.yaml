apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: unigevents
  labels:
    app: event-service
    app.kubernetes.io/part-of: unigevents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: event-service
    spec:
      # PINFO-191: deny the API server token mount. None of our pods talk
      # to the K8s API; without this flag every pod gets a JWT in
      # /var/run/secrets/kubernetes.io/serviceaccount/ that an attacker
      # could use to discover or escalate within the cluster.
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Pod-level security (PINFO-180): refuse to run as root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: event-service
          image: ghcr.io/machanier/pinfo-2026-team1/event-service:replaced-by-cd # PINFO-196: kubectl set image overrides this with the commit SHA
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: DB_URL
              value: jdbc:postgresql://event-db:5432/events_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: password
            # PINFO-202: point producers at the in-cluster Kafka broker
            # deployed under k8s/kafka/. application.properties has
            # kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
            # — without this env var the fallback to localhost wins and the
            # producer reconnect loop never finds the real broker.
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            # Shared internal-service key. event-service's InternalSecurityFilter
            # rejects any /internal/* call whose X-Internal-Service-Key header
            # doesn't equal this value — so every service that CALLS or EXPOSES an
            # /internal/* endpoint must inject the SAME secret. Without this env
            # var, event-service falls back to the hardcoded default while its
            # callers use the real secret (or vice-versa), and the calls 401.
            # Completes the PINFO-184 propagation to every service in the mesh.
            # Secret created out-of-band via kubectl — see k8s/README.md.
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: user-internal-key-secret
                  key: key
            # Cloudinary signed banner uploads (PINFO-228 — banner endpoint
            # moved from user-service to event-service). Reuses the SAME
            # `cloudinary-secret` already created on the cluster for user-service
            # (see k8s/user-service/user-service-deployment.yaml). event-service
            # only needs the banner side: cloud-name + api-key + api-secret +
            # banner-upload-preset (no avatar `upload-preset`).
            # optional: true → event-service still BOOTS if the Secret is absent;
            # the banner-signature endpoint just answers 503 until it exists.
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: cloudinary-secret
                  key: cloud-name
                  optional: true
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudinary-secret
                  key: api-key
                  optional: true
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloudinary-secret
                  key: api-secret
                  optional: true
            - name: CLOUDINARY_BANNER_UPLOAD_PRESET
              valueFrom:
                secretKeyRef:
                  name: cloudinary-secret
                  key: banner-upload-preset
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Probes hit Quarkus SmallRye Health endpoints (added in PINFO-177).
          # tcpSocket only checks port binding — httpGet detects a hung JVM
          # that still holds the socket open but no longer serves traffic.
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
