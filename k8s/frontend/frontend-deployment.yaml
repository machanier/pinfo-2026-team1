apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unigevents
  labels:
    app: frontend
    app.kubernetes.io/part-of: unigevents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          # Built & pushed by .github/workflows/cd.yml from frontend/Dockerfile.
          # Multi-stage build: Vite/React bundle served by nginx:stable-alpine
          # on port 80 with SPA fallback (see frontend/nginx.conf).
          image: ghcr.io/machanier/pinfo-2026-team1/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
