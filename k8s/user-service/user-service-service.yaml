apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: unigevents
  labels:
    app: user-service
    app.kubernetes.io/part-of: unigevents
    # Picked up by the shared ServiceMonitor in k8s/observability/.
    unigevents.com/scrape: quarkus
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
