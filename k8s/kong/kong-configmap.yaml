apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  namespace: unigevents
  labels:
    app: kong
    app.kubernetes.io/part-of: unigevents
# ─────────────────────────────────────────────────────────────────
# Source of truth: backend/kong/kong.yml
#
# Keep this file in sync with backend/kong/kong.yml. When the routing
# contract changes (new service, new route, JWT config), update BOTH
# files in the same commit, then:
#   kubectl apply -f k8s/kong/kong-configmap.yaml
#   kubectl rollout restart deployment/kong -n unigevents
#
# Kong in DB-less mode reads this file ONCE at pod start; a ConfigMap
# change alone does not reload the config without restarting the pod.
# ─────────────────────────────────────────────────────────────────
data:
  kong.yml: |
    _format_version: "3.0"

    services:
      - name: user-service
        url: http://user-service:8081
        routes:
          - name: user-route
            paths:
              - /api/users
            strip_path: false
        plugins:
          - name: jwt
            config:
              secret_is_base64: false
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf

      - name: event-service
        url: http://event-service:8082
        routes:
          - name: event-route
            paths:
              - /api/events
            strip_path: false
        plugins:
          - name: jwt
            config:
              secret_is_base64: false
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf

      - name: notification-service
        url: http://notification-service:8083
        routes:
          - name: notification-route
            paths:
              - /api/notifications
            strip_path: false
        plugins:
          - name: jwt
            config:
              secret_is_base64: false
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf

      - name: moderation-service
        url: http://moderation-service:8084
        routes:
          - name: moderation-route
            paths:
              - /api/moderation
            strip_path: false
        plugins:
          - name: jwt
            config:
              secret_is_base64: false
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf

      - name: search-service
        url: http://search-service:8085
        routes:
          - name: search-route
            paths:
              - /api/search
            strip_path: false
        plugins:
          - name: jwt
            config:
              secret_is_base64: false
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf

      - name: registration-service
        url: http://registration-service:8086
        routes:
          - name: registration-route
            paths:
              - /api/registrations
            strip_path: false
        plugins:
          - name: jwt
            config:
              secret_is_base64: false
              key_claim_name: iss
              claims_to_verify:
                - exp
                - nbf

    # Global plugins — apply to every service unless overridden per-service.
    # `policy: local` keeps the counter inside each Kong worker process,
    # which is fine while we run a single Kong replica. If we ever scale
    # Kong horizontally, switch to `redis` (and add a Redis backend) so
    # the limit is shared across nodes — `local` would otherwise let
    # each replica grant its own minute/hour budget independently.
    #
    # Limits are intentionally generous: 60 req/min and 1000 req/hour
    # per client IP. The frontend bursts on initial page load (parallel
    # calls to user, events, search) so a stricter limit would page
    # operators during normal traffic. Tune downward once we have real
    # RPS metrics.
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          hour: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false

    # Auth0 RSA public key for token signature verification.
    # See backend/kong/kong.yml for the rotation caveat — the key
    # below is the ACTIVE signing key from
    # https://unigevents.eu.auth0.com/.well-known/jwks.json
    # (kid g1ZpktWo0UH32gTar0NLl as of 2026-05-03).
    consumers:
      - username: auth0
        jwt_secrets:
          - key: "https://unigevents.eu.auth0.com/"
            algorithm: RS256
            rsa_public_key: |
              -----BEGIN PUBLIC KEY-----
              MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAzk5YYQXa+79a9+uRPaLX
              mE2Y/V54iwkvANmgsxodEv19Ke827TOddO9sm0ORG0yt1X6iyOo2cOd+m9pueDcZ
              FV/qKNAp7R92SQgI9jaq5eqXCWsUyeJc4g/XkfbVUcfHvkAB9Z2jUNRUAuGhRQkR
              kTf8PIPIx25rAJR5jfvs+3H9cTwcK10VF0AZ1whhOoNSpGjm8OqHV76xg578xbpt
              3oI8bjEV06MjwVy6zuizOyGVqWRl9I71pySc1DElDT44MiKFU6HjESgeIrOJ/DX2
              NMPEru2/pabhUWg7zp4gOVHt+1eNjuu3r5VHQtIYr5NmKYXD9n9NWSoUftyvOUC3
              6QIDAQAB
              -----END PUBLIC KEY-----
