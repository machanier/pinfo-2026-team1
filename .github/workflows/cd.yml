name: CD Pipeline

# ─────────────────────────────────────────────────────────────
# Triggered only when code is merged into develop (push event).
#
# Flow:
#   1. Build one Docker image per microservice + frontend and push
#      them to GitHub Container Registry (ghcr.io).
#   2. Trigger a rolling restart of the matching Deployments on the
#      prod microk8s cluster (pinfo1). Pods re-pull the new :latest
#      tag because every Deployment has imagePullPolicy: Always.
#
# Images produced:
#   ghcr.io/<repo>/user-service:latest
#   ghcr.io/<repo>/event-service:latest
#   ghcr.io/<repo>/registration-service:latest
#   ghcr.io/<repo>/notification-service:latest
#   ghcr.io/<repo>/moderation-service:latest
#   ghcr.io/<repo>/search-service:latest
#   ghcr.io/<repo>/frontend:latest
#
# The deploy step runs on a self-hosted GitHub Actions runner
# installed on the prod VM itself (label: pinfo1). GitHub-hosted
# runners cannot reach the cluster API because it is behind the
# UNIGE VPN; running the deploy step on the VM removes that
# constraint without exposing the cluster publicly.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - develop

# Allow the workflow to push images to ghcr.io
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build & Push one image per backend microservice
  #
  # Matrix strategy: 6 jobs run in parallel, one per service.
  # Each job builds only its own Maven module (-pl flag) to
  # avoid rebuilding all services every time.
  # ─────────────────────────────────────────────────────────────
  build-backend-images:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: user-service
          - service: event-service
          - service: registration-service
          - service: notification-service
          - service: moderation-service
          - service: search-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # -pl selects only the target module; --also-make builds its deps
      - name: Build ${{ matrix.service }} JAR (skip tests — CI already validated)
        working-directory: backend
        run: mvn --batch-mode clean package -DskipTests -pl ${{ matrix.service }} --also-make

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────
  # JOB 2 — Build & Push Frontend Image
  # ─────────────────────────────────────────
  build-frontend-image:
    name: Build & Push frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Auto-deploy to microk8s
  #
  # Runs on the self-hosted runner hosted on the prod VM (pinfo1).
  # After all 7 images are built and pushed, restart the matching
  # Deployments so they pull the new :latest tag (imagePullPolicy
  # is Always). Wait for each rollout to complete — if a pod fails
  # readiness, the job fails and the CD turns red, signalling a
  # bad deploy.
  #
  # Kong is intentionally NOT in the list: its image (kong:3.5) is
  # fixed and does not change per push. When backend/kong/kong.yml
  # or k8s/kong/kong-configmap.yaml changes, the cluster operator
  # must run `kubectl rollout restart deployment/kong -n unigevents`
  # manually after applying the new ConfigMap. See k8s/README.md.
  # ─────────────────────────────────────────────────────────────
  deploy-to-microk8s:
    name: Rollout new images on microk8s
    needs: [build-backend-images, build-frontend-image]
    runs-on: [self-hosted, pinfo1]

    steps:
      - name: Trigger rolling restart on all app Deployments
        run: |
          set -euo pipefail
          for d in user-service event-service registration-service \
                   notification-service moderation-service search-service \
                   frontend; do
            microk8s kubectl rollout restart deployment/$d -n unigevents
          done

      - name: Wait for rollouts to complete
        run: |
          set -euo pipefail
          for d in user-service event-service registration-service \
                   notification-service moderation-service search-service \
                   frontend; do
            microk8s kubectl rollout status deployment/$d -n unigevents --timeout=180s
          done
