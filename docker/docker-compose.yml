# ============================================================
# UNIGEvents — Docker Compose (Development)
# ============================================================
# Usage:
#   cp docker/.env.example docker/.env
#   docker compose -f docker/docker-compose.yml up
#
# Services started:
#   db       → PostgreSQL on localhost:5432
#   backend  → Quarkus API on localhost:8080
# ============================================================

services:

  # ──────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: unigevents-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-unigEvents}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-unigEvents}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────
  # Quarkus Backend
  # ──────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: unigevents-backend
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/${DB_NAME:-unigEvents}
      QUARKUS_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
