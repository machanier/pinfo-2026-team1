# PINFO-202: single-broker Kafka deployment for the unigevents namespace.
#
# Until this manifest landed, the project's Kafka producers/consumers
# (event-service @Outgoing event-{created,updated,cancelled}, registration-
# service @Outgoing registration-{confirmed,waitlisted,cancelled} +
# @Incoming event-cancelled) ran with `quarkus.messaging.health.enabled=
# false` and `bootstrap.servers=localhost:9092`. That kept the rollouts
# green at the cost of the cascade-cancellation flow being broken in
# prod (event.cancelled → registrations CANCELLED never propagated). With
# this StatefulSet up, the workarounds in event-service / registration-
# service application.properties are removed in the same PR and the
# Deployments inject KAFKA_BOOTSTRAP_SERVERS=kafka:9092.
#
# Topology choice — single-broker KRaft (no ZooKeeper):
#   - The unigevents cluster has 1 worker node (pinfo1). Multi-broker
#     would just spread replicas across imaginary failure domains.
#   - KRaft (Kafka 3.3+) removed the ZooKeeper dependency; modern setups
#     should not deploy ZK anymore. Confluent's cp-kafka:7.6.0 image
#     starts in KRaft mode when KAFKA_PROCESS_ROLES is set.
#   - HA / multi-broker / Strimzi operator are tracked as "future work"
#     in the PR description — not in scope for unblocking the project.
#
# Cluster ID is reused from docker-compose so a developer who switches
# between local dev and prod doesn't see two distinct cluster identities
# in their Kafka tooling. Replication factors are pinned to 1 because
# we only have 1 broker — defaults of 3 would refuse to create the
# internal __consumer_offsets / __transaction_state topics.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: unigevents
  labels:
    app: kafka
    app.kubernetes.io/part-of: unigevents
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      # PINFO-191: Kafka pods do not call the K8s API.
      automountServiceAccountToken: false
      # PINFO-180: refuse root. cp-kafka:7.6.0 ships with `appuser`
      # (UID 1000) by default. fsGroup=1000 makes the PVC writable
      # by that user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0@sha256:24cdd3a7fa89d2bed150560ebea81ff1943badfa61e51d66bb541a6b0d7fb047 # digest-pinned (parity with the other images)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: client
              containerPort: 9092
            - name: controller
              containerPort: 9093
          env:
            # KRaft single-node: this pod is both broker AND controller.
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            # PLAINTEXT listener for clients on 9092, CONTROLLER on 9093
            # for the KRaft quorum (single voter, so quorum is just self).
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            # ADVERTISED is what clients use to reconnect after the
            # initial bootstrap. Resolves via the headless Service
            # below: `kafka` -> pod IP.
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            # `<id>@<host>:<port>` — pod-0 of a StatefulSet is reachable
            # via `<pod-name>.<headless-service>` DNS, so kafka-0.kafka.
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-0.kafka:9093"
            # Replication factor = 1 because we have one broker. Kafka
            # otherwise refuses to bootstrap __consumer_offsets etc. with
            # the default of 3.
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            # Auto-create topics on first publish. The team's producers
            # don't pre-declare topics; without this, the first
            # `Emitter.send` would fail. Acceptable for a project
            # cluster — production-grade setups should disable this and
            # provision topics via a Strimzi KafkaTopic CRD.
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            # Reused from docker-compose so a developer's local Kafka
            # tooling sees the same cluster identity in both envs.
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            # JVM sizing: 256-512Mi heap is plenty for the project's
            # message volume. The container limit (1Gi) leaves headroom
            # for direct memory + page cache.
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256M -Xmx512M"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            # PINFO-202 follow-up: requests originally set to 200m CPU /
            # 512Mi memory. The CPU figure pushed the node over its
            # 2000m capacity (existing pods already requested 1850m, so
            # 1850 + 200 = 2050m > 2000m available). The scheduler
            # silently refused to place the pod — `kubectl describe pod
            # kafka-0` showed `PodScheduled: False, Events: <none>` for
            # 35+ minutes with no error visible, because modern k8s
            # versions rate-limit "no node available" events. Dropped
            # the request to 100m to match the other backend pods and
            # leave room on the node. Burst capacity (limit) also
            # halved to 500m — Kafka idles at single-digit milli-CPU
            # for this project's traffic.
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # Probes: `kafka-broker-api-versions` returns 0 only once the
          # broker is registered with the controller and serving the
          # metadata API — strictly stronger than a TCP-socket check,
          # which would pass while the broker is still loading state.
          #
          # PINFO-202 follow-up #3: previous timings (initialDelay=20s,
          # period=5s, timeout=5s) had the broker stuck Running 0/1 with
          # `Restart Count: 0` and only one event in `kubectl describe`:
          #   Readiness probe failed: command timed out after 5s
          # Logs confirmed Kafka was fully up — every __consumer_offsets
          # partition had an elected leader, `event.cancelled` was auto-
          # created, registration-service's consumer group was already
          # registered against the broker. The probe itself is the
          # bottleneck: `kafka-broker-api-versions` is a shell wrapper
          # around `kafka-run-class.sh`, which spawns a full Kafka JVM
          # client on every invocation. JVM cold start on a 100m-CPU
          # request pod takes 5-10s by itself, so a 5s timeout is
          # systematically insufficient. Run by hand with a warm page
          # cache the same command returns in <1s — the kubelet probe
          # doesn't get that luxury.
          # New timings:
          #   initialDelaySeconds=30  (let the first cold JVM finish)
          #   periodSeconds=30        (no value in re-checking every 5s)
          #   timeoutSeconds=15       (covers JVM cold start + RPC RTT)
          #   failureThreshold=3      (period*threshold = 90s grace,
          #                           same order of magnitude as before)
          # Pattern matches what Strimzi and the cp-kafka Helm chart
          # ship for the same reason.
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:9092
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: microk8s-hostpath
        resources:
          requests:
            # 5Gi: __consumer_offsets + 6 topics with 7-day retention.
            # Project message volume is < 100 MB/day in steady state,
            # so this gives ~50× headroom. Resize via PVC expansion if
            # ever needed (microk8s-hostpath supports it in place).
            storage: 5Gi
