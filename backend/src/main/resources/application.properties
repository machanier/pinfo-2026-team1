# ──────────────────────────────────────────
# Configuration base de données (PostgreSQL)
# ──────────────────────────────────────────
# Valeurs communes à tous les profils
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}

# URL scopée au profil %dev uniquement
# → en %test, Quarkus Dev Services démarre automatiquement un PostgreSQL
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:unigEvents}

# ──────────────────────────────────────────
# Hibernate ORM — scopé par profil
# ──────────────────────────────────────────
# %dev  : recrée le schéma à chaque démarrage (pratique pour développer)
# %test : recrée aussi pour avoir un état propre à chaque test
# %prod : validate seulement — ne touche JAMAIS aux données de production
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=validate

# ──────────────────────────────────────────
# OpenAPI / Swagger UI — dev et test uniquement
# ──────────────────────────────────────────
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
%dev.quarkus.swagger-ui.path=/swagger-ui
