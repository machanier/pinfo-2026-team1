quarkus.http.port=8086
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${MODERATION_DB_USER:moderation_service}
quarkus.datasource.password=${MODERATION_DB_PASSWORD:moderation_service_pwd}
quarkus.datasource.jdbc.url=jdbc:postgresql://${MODERATION_DB_HOST:localhost}:${MODERATION_DB_PORT:5438}/${MODERATION_DB_NAME:moderation_service_db}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.smallrye-openapi.path=/openapi
