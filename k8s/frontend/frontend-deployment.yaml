apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unigevents
  labels:
    app: frontend
    app.kubernetes.io/part-of: unigevents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # PINFO-191: nginx serving a static SPA never needs the K8s API.
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Pod-level security (PINFO-180): refuse to run as root.
      # nginx-unprivileged runs as UID 101 and only writes to /tmp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # Built & pushed by .github/workflows/cd.yml from frontend/Dockerfile.
          # Multi-stage build: Vite/React bundle served by
          # nginxinc/nginx-unprivileged:stable-alpine on port 8080
          # (UID 101 cannot bind <1024) with SPA fallback. See
          # frontend/nginx.conf and PINFO-180.
          image: ghcr.io/machanier/pinfo-2026-team1/frontend:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
