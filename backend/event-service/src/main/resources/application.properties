quarkus.http.port=8082
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${EVENT_DB_USER:event_service}
quarkus.datasource.password=${EVENT_DB_PASSWORD:event_service_pwd}
quarkus.datasource.jdbc.url=jdbc:postgresql://${EVENT_DB_HOST:localhost}:${EVENT_DB_PORT:5434}/${EVENT_DB_NAME:event_service_db}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.smallrye-openapi.path=/openapi
