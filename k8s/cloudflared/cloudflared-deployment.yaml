apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: unigevents
  labels:
    app: cloudflared
    app.kubernetes.io/part-of: unigevents
# ─────────────────────────────────────────────────────────────
# Cloudflare Tunnel running inside the cluster.
#
# The tunnel is configured on the Cloudflare dashboard to forward
# incoming traffic to http://localhost:80 on the VM. In a standard
# pod, "localhost" refers to the pod itself, so that target would
# not be reachable. Using `hostNetwork: true` puts this pod in the
# VM's network namespace, so localhost:80 reaches the nginx-ingress
# controller (which binds port 80 on the host via hostPort). This
# makes the k8s pod behaviourally equivalent to `docker run
# --network host cloudflare/cloudflared ...`, with the added
# benefit of being managed by kubectl like the rest of the app.
#
# The tunnel token is stored in a Secret named `cloudflared-token`
# (key: `token`), created out-of-band with:
#
#   kubectl create secret generic cloudflared-token \
#     --namespace=unigevents \
#     --from-literal=token='<REDACTED_TUNNEL_TOKEN>'
#
# That Secret is NOT committed to Git.
# ─────────────────────────────────────────────────────────────
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      # PINFO-191: cloudflared only opens an outbound tunnel; it never
      # talks to the K8s API. Even with hostNetwork=true (where the
      # NetworkPolicy CNI does not enforce pod rules) we can still strip
      # the SA token mount via this flag, which is enforced by the
      # kubelet itself, not by the CNI.
      automountServiceAccountToken: false
      # Share pinfo1's network namespace (see comment at the top).
      hostNetwork: true
      # With hostNetwork, pods use the host's resolver by default.
      # ClusterFirstWithHostNet keeps k8s service DNS (cluster.local)
      # available — useful if we ever want probes against in-cluster
      # services.
      dnsPolicy: ClusterFirstWithHostNet
      # Pod-level security (PINFO-180): cloudflared:latest already
      # ships with USER nonroot (UID 65532) and only opens outbound
      # connections, so dropping all capabilities is safe even with
      # hostNetwork — we just share the host netns, we don't bind
      # privileged ports.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0 # PINFO-196
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 127.0.0.1:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # /ready on the metrics endpoint returns HTTP 200 only when
          # the tunnel has at least one registered connection to the
          # Cloudflare edge. Unlike a TCP probe, this guarantees the
          # tunnel is actually carrying traffic before we say "Ready".
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
              host: 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
              host: 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
