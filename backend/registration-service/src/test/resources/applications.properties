quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:registration_user}
quarkus.datasource.password=${DB_PASSWORD:registration_pwd}

# Only for prod
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${REGISTRATION_DB_HOST:localhost}:${REGISTRATION_DB_PORT:5435}/registrations_db

# Tests → use container
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create