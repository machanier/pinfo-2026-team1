apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: unigevents
  namespace: unigevents
  labels:
    app.kubernetes.io/part-of: unigevents
  # ─────────────────────────────────────────────────────────────
  # Traffic flow:
  #   browser ──HTTPS──▶ Cloudflare edge (TLS terminates here)
  #                          │
  #                          ▼ outbound tunnel (cloudflared pod)
  #                  :80 nginx-ingress (microk8s addon)
  #                       ├─ /api/*  ──▶ kong-proxy:8000 ──▶ <microservice>
  #                       └─ /*      ──▶ frontend:80 (nginx serving the SPA)
  #
  # TLS at THIS Ingress is intentionally OFF: TLS is terminated upstream
  # on the Cloudflare edge (free managed cert) and forwarded over the
  # outbound tunnel as plain HTTP. There is no public DNS A-record
  # pointing at the VM's IP — public traffic only enters through the
  # Cloudflare Tunnel.
  #
  # If we ever drop Cloudflare and need TLS at the Ingress directly
  # (custom domain pointed at the VM), add:
  #   - a `tls:` block with a Secret provisioned by cert-manager
  #   - the annotation `cert-manager.io/cluster-issuer: letsencrypt-prod`
  #   - a `host:` on each rule
  # ─────────────────────────────────────────────────────────────
  annotations:
    # Kong already strips/forwards paths correctly (strip_path: false).
    # We just pass the path through as-is.
    nginx.ingress.kubernetes.io/use-regex: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # More specific first is good practice, but nginx-ingress sorts
          # by path length internally — /api will win over / either way.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
