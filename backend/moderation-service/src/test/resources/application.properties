internal.service.key=test-key
openai.api.key=test-key
quarkus.http.test-port=0
quarkus.kafka.devservices.enabled=false
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:moderation;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.jacoco.report=true
# Disable Kafka connectors for Quarkus tests that don't exercise messaging
mp.messaging.incoming.event-updated.enabled=false
mp.messaging.incoming.event-submitted.enabled=false
mp.messaging.incoming.event-cancelled.enabled=false
mp.messaging.incoming.announcement-submitted.enabled=false
mp.messaging.outgoing.event-moderated.enabled=false
mp.messaging.outgoing.announcement-moderated.enabled=false
mp.messaging.outgoing.event-flagged.enabled=false
