# === moderation-service ===
quarkus.http.port=8084
quarkus.application.name=moderation-service
# DataSource (à adapter par environnement)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:moderation_service}
# PINFO-211: production must fail-fast if DB_PASSWORD is unset (no
# fallback secret in the committed config); %dev keeps the well-known
# value so `mvn quarkus:dev` and docker-compose still work locally.
quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.password=moderation_service_pwd
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5438/moderation_db}
# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
# Log
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
# Health + Prometheus metrics (auto-exposed at /q/health/{live,ready} and /q/metrics)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
# JWT / Auth0
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://api.unigevents.ch
mp.jwt.token.header=Authorization
smallrye.jwt.path.groups=https://unigevents.com/roles
# Modération OpenAI
openai.api.key=${OPENAI_API_KEY}
quarkus.rest-client.openai-moderation.url=https://api.openai.com
# Event Service
quarkus.rest-client.event-service.url=${EVENT_SERVICE_URL:http://localhost:8082}
internal.service.key=${INTERNAL_SERVICE_KEY:unigevents-internal-secret}
# Kafka
mp.messaging.incoming.event-created.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.event-created.connector=smallrye-kafka
mp.messaging.incoming.event-created.topic=event.created
mp.messaging.incoming.event-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-created.group.id=moderation-service
mp.messaging.incoming.event-updated.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.event-updated.connector=smallrye-kafka
mp.messaging.incoming.event-updated.topic=event.updated
mp.messaging.incoming.event-updated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-updated.group.id=moderation-service
mp.messaging.incoming.event-cancelled.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.event-cancelled.connector=smallrye-kafka
mp.messaging.incoming.event-cancelled.topic=event.cancelled
mp.messaging.incoming.event-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-cancelled.group.id=moderation-service
mp.messaging.incoming.announcement-submitted.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.incoming.announcement-submitted.connector=smallrye-kafka
mp.messaging.incoming.announcement-submitted.topic=announcement.submitted
mp.messaging.incoming.announcement-submitted.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.announcement-submitted.group.id=moderation-service
