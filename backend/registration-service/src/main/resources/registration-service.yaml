openapi: 3.0.3
info:
  title: Registration Service
  description: >
    Handles event registration and cancellation by students. Enforces capacity
    limits and eligibility rules by calling the Event Service and User Service
    via internal REST endpoints. Publishes Kafka events for the Notification
    Service to react to.

    When a student cancels, the Registration Service publishes
    registration.cancelled which includes the list of waitlisted student IDs
    and the number of available slots. The Notification Service is responsible
    for notifying those waitlisted students of the free spot.
  version: 1.0.0

servers:
  - url: http://localhost:8083
    description: Local development

tags:
  - name: Registrations
    description: Student registration operations
  - name: Organizer
    description: Organizer views of registrations for their events
  - name: Internal
    description: Internal endpoints for service-to-service calls

paths:
  # ── STUDENT ENDPOINTS ─────────────────────────────────────────────────────

  /api/registrations:
    post:
      tags: [Registrations]
      summary: Register the authenticated student for an event
      description: >
        Executes the full registration flow in order:
        1. Calls Event Service /internal/events/{eventId} — verifies event is PUBLISHED
           and retrieves restrictedTo eligibility rules.
        2. Calls User Service /internal/users/{userId}/eligibility — verifies the
           student meets the restrictedTo rules. Returns 400 if not eligible.
        3. Calls Event Service /internal/events/{eventId}/capacity — checks available slots.
        4. If slots available: creates registration with status CONFIRMED,
           publishes registration.confirmed to Kafka.
        5. If no slots: creates registration with status WAITLISTED,
           publishes registration.waitlisted to Kafka.
        6. If already registered: returns 409.
      security:
        - Auth0: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRegistrationRequest"
      responses:
        "201":
          description: Registration created (CONFIRMED or WAITLISTED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          description: Student does not meet the event's eligibility requirements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Student is already registered for this event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/registrations/me:
    get:
      tags: [Registrations]
      summary: List the authenticated student's own registrations
      description: >
        Reads the user ID from the JWT subject claim. No user ID needed in the path.
        Supports filtering by ?status and pagination.
      security:
        - Auth0: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RegistrationStatus"
          description: Filter by registration status
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of own registrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationPage"

  /api/registrations/{registrationId}:
    get:
      tags: [Registrations]
      summary: Get a single registration
      description: Returns 403 if the JWT subject does not own this registration.
      security:
        - Auth0: []
      parameters:
        - $ref: "#/components/parameters/RegistrationId"
      responses:
        "200":
          description: Registration details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "403":
          description: Not your registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Registration not found

    delete:
      tags: [Registrations]
      summary: Cancel own registration
      description: >
        Sets registration status to CANCELLED.
        Publishes registration.cancelled to Kafka. The Notification Service
        consumes this event and sends notifications to waitlisted students
        informing them that a spot is now available.
        Returns 409 if the event has already taken place.
      security:
        - Auth0: []
      parameters:
        - $ref: "#/components/parameters/RegistrationId"
      responses:
        "204":
          description: Registration cancelled
        "403":
          description: Not your registration
        "404":
          description: Registration not found
        "409":
          description: Cannot cancel a registration for a past event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── ORGANIZER ENDPOINTS ───────────────────────────────────────────────────

  /api/events/{eventId}/registrations:
    get:
      tags: [Organizer]
      summary: List all registrations for an event
      description: Only accessible to the organizer who owns the event.
      security:
        - Auth0: []
      parameters:
        - $ref: "#/components/parameters/EventId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RegistrationStatus"
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated list of registrations for the event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationPage"
        "403":
          description: Not the event organizer

  /api/events/{eventId}/registrations/stats:
    get:
      tags: [Organizer]
      summary: Get registration statistics for an event
      description: >
        Returns a summary of registration counts per status plus available slots.
        Only accessible to the event organizer.
      security:
        - Auth0: []
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Registration statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationStats"
        "403":
          description: Not the event organizer

  /api/events/{eventId}/registrations/{registrationId}/confirm:
    patch:
      tags: [Organizer]
      summary: Manually confirm a PENDING registration
      description: >
        Used when the event is configured for manual approval.
        Transitions PENDING → CONFIRMED and publishes registration.confirmed
        to Kafka so the student is notified.
      security:
        - Auth0: []
      parameters:
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/RegistrationId"
      responses:
        "200":
          description: Registration confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "403":
          description: Not the event organizer
        "409":
          description: Registration is not in PENDING status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── INTERNAL ENDPOINTS ────────────────────────────────────────────────────

  /internal/events/{eventId}/registrations/participants:
    get:
      tags: [Internal]
      summary: List participant student IDs for an event
      description: >
        Returns student IDs for registrations that are CONFIRMED or WAITLISTED.
        Used by the Notification Service to build its recipient list.
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: List of participant student IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /internal/events/{eventId}/registrations/confirmed:
    get:
      tags: [Internal]
      summary: List confirmed student IDs for an event
      description: >
        Returns student IDs for registrations that are CONFIRMED only.
        Used by the Notification Service for announcement notifications.
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: List of confirmed student IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

# ── COMPONENTS ────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    Auth0:
      type: openIdConnect
      openIdConnectUrl: https://YOUR_TENANT.auth0.com/.well-known/openid-configuration

  parameters:
    RegistrationId:
      name: registrationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    RegistrationStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELLED, WAITLISTED]

    CreateRegistrationRequest:
      type: object
      required: [eventId]
      properties:
        eventId:
          type: string
          format: uuid

    RegistrationResponse:
      type: object
      properties:
        registrationId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        studentId:
          type: string
          format: string
        status:
          $ref: "#/components/schemas/RegistrationStatus"
        registeredAt:
          type: string
          format: date-time
        waitlistPosition:
          type: integer
          nullable: true
          description: Position in the waitlist. Only present when status is WAITLISTED.

    RegistrationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationResponse"
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    RegistrationStats:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        capacity:
          type: integer
          nullable: true
        confirmed:
          type: integer
        pending:
          type: integer
        waitlisted:
          type: integer
        cancelled:
          type: integer
        availableSlots:
          type: integer
          nullable: true

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 409
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
