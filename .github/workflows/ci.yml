name: CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 0 — Secret scan (gitleaks)
  #
  # Scans the repository for accidentally-committed secrets
  # (API keys, JWTs, passwords, ...). Fails the pipeline on any
  # match so the secret never makes it into `develop`.
  #
  # We install the binary directly instead of using the official
  # gitleaks Action so the workflow keeps running without an
  # organization licence. The binary itself is MIT-licensed.
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v6
        with:
          # gitleaks scans the diff range and the full history;
          # fetch-depth: 0 gives it everything it needs.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=$(curl -sSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Installing gitleaks v${GITLEAKS_VERSION}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks
        # --redact: never print the secret in logs.
        # --verbose: list each finding with the offending file/line.
        # The default ruleset already covers AWS keys, GitHub tokens,
        # JWTs, generic high-entropy strings, etc.
        run: gitleaks detect --source . --verbose --redact --no-banner

  # ─────────────────────────────────────────
  # JOB 1 — Build Backend (Java / Quarkus)
  # ─────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    # ── Service container : PostgreSQL pour les tests @QuarkusTest ──
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unigEvents
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build and test with Maven (generates JaCoCo report)
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: unigEvents
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: mvn --batch-mode clean verify

      - name: Debug JaCoCo
        working-directory: backend
        run: |
          echo "=== Tous les jacoco.xml trouvés ==="
          find . -name "jacoco.xml" 2>/dev/null
          echo "=== Taille des rapports ==="
          find . -name "jacoco.xml" -exec wc -l {} \;
          echo "=== Contenu du rapport agrégé ==="
          cat target/jacoco-report/jacoco.xml 2>/dev/null || echo "Rapport agrégé introuvable"
          echo "=== Contenu du rapport user-service ==="
          cat user-service/target/jacoco-report/jacoco.xml 2>/dev/null || echo "Rapport user-service introuvable"
          echo "=== Fichiers .exec ==="
          find . -name "jacoco.exec" 2>/dev/null

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/**/target/jacoco-report/jacoco.xml
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2 — Build Frontend (React / Vite)
  # ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3 — SonarCloud Backend Analysis
  # ─────────────────────────────────────────
  sonarcloud-backend:
    name: SonarCloud Backend
    runs-on: ubuntu-latest
    needs: build-backend
    # Skip on Dependabot PRs: GitHub does not expose Actions secrets
    # to PRs opened by Dependabot (security policy since 2021), so
    # SONAR_TOKEN would be empty and the job would always fail with
    # "Project not found". Dep-bump PRs only touch lockfiles/pom.xml
    # — no application code to analyze and no coverage delta to
    # measure — so skipping Sonar here loses no real signal. The
    # actual safety net on these PRs is `build-backend` (above),
    # which compiles and runs the full JUnit suite against the
    # bumped dependencies.
    if: |
      github.actor != 'dependabot[bot]' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name == github.repository)
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compile backend (needed by sonar:sonar)
        working-directory: backend
        run: mvn --batch-mode clean compile -DskipTests

      - name: Download JaCoCo coverage report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: backend/

      - name: Analyze with SonarCloud
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --batch-mode sonar:sonar -DskipTests

  # ─────────────────────────────────────────
  # JOB 4 — SonarCloud Frontend Analysis
  # ─────────────────────────────────────────
  sonarcloud-frontend:
    name: SonarCloud Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    # Skip on Dependabot PRs — see the same comment on
    # `sonarcloud-backend` above.
    if: |
      github.actor != 'dependabot[bot]' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name == github.repository)
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests with coverage
        working-directory: frontend
        run: npx vitest run --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=unigEvents-frontend
            -Dsonar.organization=machanier
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=src/**/*.test.jsx,src/**/*.test.js,src/setupTests.js
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.test.jsx,src/**/*.test.js
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
