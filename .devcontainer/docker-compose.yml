# ============================================================
# UNIGEvents — Docker Compose (Dev Container)
# ============================================================
# Utilisé exclusivement par VS Code pour le dev container.
# Le fichier docker/docker-compose.yml reste dédié
# aux tests d'intégration et aux pipelines CI/CD.
# ============================================================

services:
  # ──────────────────────────────
  # Environnement de développement
  # ──────────────────────────────
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      user-db:
        condition: service_started
      event-db:
        condition: service_started
      registration-db:
        condition: service_started
      notification-db:
        condition: service_started
      search-db:
        condition: service_started
      moderation-db:
        condition: service_started
      zookeeper:
        condition: service_started
      kafka:
        condition: service_started

  user-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pwd
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: event_service
      POSTGRES_PASSWORD: event_service_pwd
    volumes:
      - event_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_service -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  registration-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: registrations_db
      POSTGRES_USER: registration_service
      POSTGRES_PASSWORD: registration_service_pwd
    volumes:
      - registration_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U registration_service -d registrations_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: notification_service_pwd
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U notification_service -d notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: search_db
      POSTGRES_USER: search_service
      POSTGRES_PASSWORD: search_service_pwd
    volumes:
      - search_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_service -d search_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  moderation-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: moderation_service
      POSTGRES_PASSWORD: moderation_service_pwd
    volumes:
      - moderation_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderation_service -d moderation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  user_db_data:
  event_db_data:
  registration_db_data:
  notification_db_data:
  search_db_data:
  moderation_db_data:
