# PINFO-202: headless Service for the Kafka StatefulSet.
#
# clusterIP: None gives us two things at once:
#   1. Stable per-pod DNS — kafka-0.kafka.unigevents.svc resolves to
#      the pod's IP, which is what KAFKA_CONTROLLER_QUORUM_VOTERS
#      needs to point at on a StatefulSet.
#   2. Plain `kafka` resolves directly to the pod IP (single endpoint
#      with one replica), which is what clients use as their
#      bootstrap.servers value (e.g. KAFKA_BOOTSTRAP_SERVERS=kafka:9092
#      in the event-service / registration-service Deployments).
#
# This mirrors the headless-Service-per-StatefulSet pattern used by the
# 6 Postgres databases (see e.g. user-db-service.yaml). When this
# project ever moves to multi-broker, we'll likely add a second
# (non-headless) Service for clients and keep this one for KRaft
# quorum DNS. Out of scope here.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: unigevents
  labels:
    app: kafka
    app.kubernetes.io/part-of: unigevents
spec:
  clusterIP: None
  # PINFO-202 follow-up #2: publish kafka-0 in this Service's DNS records
  # even before its readiness probe passes. Required because Kafka in KRaft
  # mode (single-pod broker+controller) needs to resolve its OWN stable
  # DNS name `kafka-0.kafka` at startup — KAFKA_CONTROLLER_QUORUM_VOTERS=
  # 1@kafka-0.kafka:9093 makes the broker connect to the controller (which
  # is itself), and that connection happens during Kafka's bootstrap,
  # BEFORE the broker is registered and the readiness probe could pass.
  # Without this flag the DNS-then-Ready chicken-and-egg deadlocks: the
  # pod can't register with itself because DNS doesn't resolve, the
  # readiness probe stays DOWN forever, the liveness probe eventually
  # kills the pod, kubelet restarts it, same loop. Symptom in logs:
  #   java.net.UnknownHostException: kafka-0.kafka
  # Pattern documented at https://kubernetes.io/docs/concepts/services-
  # networking/service/#headless-services and used by Strimzi for the
  # same reason. Side effect: client traffic to `kafka:9092` will also
  # land on kafka-0 even when not Ready — that's fine, the producer
  # connection just retries until the broker comes up.
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
