version: '3.9'

services:

  # ── Databases ──────────────────────────────────────────────────────────────
  postgres-user:
    image: postgres:16
    environment:
      POSTGRES_DB: unigevents_user
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    networks:
      - unigevents-net

  postgres-event:
    image: postgres:16
    environment:
      POSTGRES_DB: unigevents_event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    networks:
      - unigevents-net

  postgres-notification:
    image: postgres:16
    environment:
      POSTGRES_DB: unigevents_notification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]
    networks:
      - unigevents-net

  postgres-moderation:
    image: postgres:16
    environment:
      POSTGRES_DB: unigevents_moderation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5435:5432"]
    networks:
      - unigevents-net

  postgres-search:
    image: postgres:16
    environment:
      POSTGRES_DB: unigevents_search
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5436:5432"]
    networks:
      - unigevents-net

  postgres-registration:
    image: postgres:16
    environment:
      POSTGRES_DB: unigevents_registration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5437:5432"]
    networks:
      - unigevents-net

  # ── Services ───────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ./backend         
      dockerfile: user-service/Dockerfile
    hostname: user-service
    ports: ["8081:8081"]
    environment:
      DB_URL: jdbc:postgresql://postgres-user:5432/unigevents_user
      DB_USER: postgres
      DB_PASSWORD: postgres
      QUARKUS_OIDC_AUTH_SERVER_URL: https://dev-cy8uphtpfx5bdclo.us.auth0.com/
    depends_on: [postgres-user]
    networks:
      - unigevents-net

  event-service:
    build:
      context: ./backend          
      dockerfile: event-service/Dockerfile
    ports: ["8082:8082"]
    environment:
      DB_URL: jdbc:postgresql://postgres-event:5432/unigevents_event
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [postgres-event]
    networks:
      - unigevents-net

  notification-service:
    build:
      context: ./backend          
      dockerfile: notification-service/Dockerfile
    ports: ["8083:8083"]
    environment:
      DB_URL: jdbc:postgresql://postgres-notification:5432/unigevents_notification
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [postgres-notification]
    networks:
      - unigevents-net

  moderation-service:
    build:
      context: ./backend          
      dockerfile: moderation-service/Dockerfile
    ports: ["8084:8084"]
    environment:
      DB_URL: jdbc:postgresql://postgres-moderation:5432/unigevents_moderation
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [postgres-moderation]
    networks:
      - unigevents-net

  search-service:
    build:
      context: ./backend          
      dockerfile: search-service/Dockerfile
    ports: ["8085:8085"]
    environment:
      DB_URL: jdbc:postgresql://postgres-search:5432/unigevents_search
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [postgres-search]
    networks:
      - unigevents-net

  registration-service:
    build:
      context: ./backend          
      dockerfile: registration-service/Dockerfile
    ports: ["8086:8086"]
    environment:
      DB_URL: jdbc:postgresql://postgres-registration:5432/unigevents_registration
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on: [postgres-registration]
    networks:
      - unigevents-net

  # ── API Gateway (Kong) ─────────────────────────────────────────────────────
  kong:
    image: kong:3.5
    user: "0:0"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /backend/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./backend/kong:/backend/kong         
    ports:
      - "8000:8000"
      - "8001:8001"
    networks:
      - unigevents-net

networks:
  unigevents-net:
    driver: bridge


