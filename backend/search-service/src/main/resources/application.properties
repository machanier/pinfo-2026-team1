# === search-service ===
quarkus.http.port=8085
quarkus.application.name=search-service
# =====================================================
# DATABASE (shared config)
# =====================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:search_service}
# PINFO-211: production must fail-fast if DB_PASSWORD is unset (no committed
# fallback secret in the tree); %dev keeps the well-known value for local runs
# and docker-compose. The %test profile resolves it the same way (see below).
quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.password=search_service_pwd
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.hibernate-orm.log.sql=false
# PROD schema strategy
quarkus.hibernate-orm.database.generation=update
# DEV profile — pointe vers le conteneur search-db du docker-compose
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://search-db:5432/search_db
%dev.quarkus.datasource.password=search_service_pwd
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
# =====================================================
# TEST PROFILE — see src/test/resources/application.properties
# =====================================================
# REST CLIENTS
# =====================================================
quarkus.rest-client.event-service.url=http://event-service:8082
quarkus.rest-client.user-service.url=http://user-service:8081
# =====================================================
# LOGGING / OPENAPI / METRICS
# =====================================================
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health
quarkus.log.category."io.smallrye.jwt".level=DEBUG
# =====================================================
# JWT
# =====================================================
mp.jwt.verify.issuer=https://dev-cy8uphtpfx5bdclo.us.auth0.com/
mp.jwt.verify.publickey.location=https://dev-cy8uphtpfx5bdclo.us.auth0.com/.well-known/jwks.json
mp.jwt.verify.audiences=https://user-service.unigevents.com
mp.jwt.token.header=Authorization
# =====================================================
# KAFKA (PROD ONLY)
# =====================================================
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# En tests, on bypass le fallback "kafka:9092" (hostname Docker Compose
# non-résolu) au profit du broker Kafka démarré par devservices sur localhost.
# Aligné avec ce que fait registration-service.
%test.kafka.bootstrap.servers=localhost:9092
# =====================================================
# KAFKA INCOMING CHANNELS (RECEPTION)
# =====================================================
mp.messaging.incoming.event-created.connector=smallrye-kafka
mp.messaging.incoming.event-created.topic=event.created
mp.messaging.incoming.event-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-created.group.id=search-service
mp.messaging.incoming.event-created.auto.offset.reset=earliest
mp.messaging.incoming.event-updated.connector=smallrye-kafka
mp.messaging.incoming.event-updated.topic=event.updated
mp.messaging.incoming.event-updated.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-updated.group.id=search-service
mp.messaging.incoming.event-updated.auto.offset.reset=earliest
mp.messaging.incoming.event-cancelled.connector=smallrye-kafka
mp.messaging.incoming.event-cancelled.topic=event.cancelled
mp.messaging.incoming.event-cancelled.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.event-cancelled.group.id=search-service
mp.messaging.incoming.event-cancelled.auto.offset.reset=earliest
mp.messaging.incoming.organizers.group.id=search-service
mp.messaging.incoming.organizers.auto.offset.reset=earliest
mp.messaging.incoming.organizer-deleted.connector=smallrye-kafka
mp.messaging.incoming.organizer-deleted.topic=organizer.deleted
mp.messaging.incoming.organizer-deleted.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.organizer-deleted.group.id=search-service
mp.messaging.incoming.organizer-deleted.auto.offset.reset=earliest
mp.messaging.incoming.organizers.connector=smallrye-kafka
mp.messaging.incoming.organizers.topic=organizers-topic
# On utilise le désérialiseur magique de Quarkus en lui passant la classe cible
mp.messaging.incoming.organizers.value.deserializer=ch.unige.pinfo.search.messaging.OrganizerDtoDeserializer