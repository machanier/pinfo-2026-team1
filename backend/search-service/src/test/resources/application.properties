# =====================================================
# TEST PROFILE — in-memory H2, no Docker required
# =====================================================
quarkus.http.test-port=0
# Use H2 in-memory database so tests never need Docker/DevServices
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:search;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=sa
# Recreate schema on each test run
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Disable DevServices (no Docker in CI)
quarkus.datasource.devservices.enabled=false
quarkus.kafka.devservices.enabled=false
quarkus.hibernate-search-orm.elasticsearch.devservices.enabled=false
# Disable all Kafka messaging channels so tests don't need a broker
mp.messaging.incoming.event-created.enabled=false
mp.messaging.incoming.event-updated.enabled=false
mp.messaging.incoming.event-cancelled.enabled=false
mp.messaging.incoming.organizers.enabled=false
mp.messaging.incoming.organizer-deleted.enabled=false
# JaCoCo coverage report
quarkus.jacoco.report=true
