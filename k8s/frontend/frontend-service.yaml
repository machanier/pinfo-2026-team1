apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: unigevents
  labels:
    app: frontend
    app.kubernetes.io/part-of: unigevents
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      # PINFO-180: pod listens on 8080 (nginx-unprivileged). The Service
      # keeps port 80 so the Ingress / Kong upstream URL is unchanged.
      targetPort: 8080
