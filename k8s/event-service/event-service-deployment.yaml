apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: unigevents
  labels:
    app: event-service
    app.kubernetes.io/part-of: unigevents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: event-service
    spec:
      # PINFO-191: deny the API server token mount. None of our pods talk
      # to the K8s API; without this flag every pod gets a JWT in
      # /var/run/secrets/kubernetes.io/serviceaccount/ that an attacker
      # could use to discover or escalate within the cluster.
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-pull-secret
      # Pod-level security (PINFO-180): refuse to run as root.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: event-service
          image: ghcr.io/machanier/pinfo-2026-team1/event-service:replaced-by-cd # PINFO-196: kubectl set image overrides this with the commit SHA
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: DB_URL
              value: jdbc:postgresql://event-db:5432/events_db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Probes hit Quarkus SmallRye Health endpoints (added in PINFO-177).
          # tcpSocket only checks port binding — httpGet detects a hung JVM
          # that still holds the socket open but no longer serves traffic.
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
