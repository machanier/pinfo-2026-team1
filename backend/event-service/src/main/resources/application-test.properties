# Test profile configuration
quarkus.profile=test
# Use H2 in-memory database for tests instead of PostgreSQL
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;MODE=PostgreSQL
quarkus.datasource.username=sa
quarkus.datasource.password=
# Schema management for testing
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Logging
quarkus.log.level=INFO
# Internal service key used by InternalSecurityFilter tests
internal.service.key=test-internal-key
