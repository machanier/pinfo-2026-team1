# ============================================================
# UNIGEvents — Docker Compose (Dev Container)
# ============================================================
# Utilisé exclusivement par VS Code pour le dev container.
# Le fichier docker/docker-compose.yml reste dédié
# aux tests d'intégration et aux pipelines CI/CD.
# ============================================================

services:

  # ──────────────────────────────
  # Environnement de développement
  # ──────────────────────────────
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      user-db:
        condition: service_healthy
      event-db:
        condition: service_healthy
      registration-db:
        condition: service_healthy
      notification-db:
        condition: service_healthy
      search-db:
        condition: service_healthy
      moderation-db:
        condition: service_healthy

  user-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service_pwd
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: event_service
      POSTGRES_PASSWORD: event_service_pwd
    volumes:
      - event_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_service -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  registration-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: registrations_db
      POSTGRES_USER: registration_service
      POSTGRES_PASSWORD: registration_service_pwd
    volumes:
      - registration_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registration_service -d registrations_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: notification_service_pwd
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_service -d notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: search_db
      POSTGRES_USER: search_service
      POSTGRES_PASSWORD: search_service_pwd
    volumes:
      - search_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_service -d search_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  moderation-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: moderation_service
      POSTGRES_PASSWORD: moderation_service_pwd
    volumes:
      - moderation_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderation_service -d moderation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  user_db_data:
  event_db_data:
  registration_db_data:
  notification_db_data:
  search_db_data:
  moderation_db_data:
