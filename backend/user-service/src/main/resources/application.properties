quarkus.http.port=8081
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${USER_DB_USER:user_service}
quarkus.datasource.password=${USER_DB_PASSWORD:user_service_pwd}
quarkus.datasource.jdbc.url=jdbc:postgresql://${USER_DB_HOST:localhost}:${USER_DB_PORT:5433}/${USER_DB_NAME:user_service_db}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.smallrye-openapi.path=/openapi
