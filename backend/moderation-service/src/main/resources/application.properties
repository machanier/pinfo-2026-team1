quarkus.http.port=8084
quarkus.application.name=moderation-service
# DataSource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:moderation_service}
quarkus.datasource.password=${DB_PASSWORD:moderation_service_pwd}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5438/moderation_db}
# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
# Log
quarkus.log.level=INFO
quarkus.smallrye-openapi.path=/openapi
# langchain4j
quarkus.langchain4j.ollama.chat-model.model-id=llama-guard3:1b
quarkus.langchain4j.ollama.chat-model.temperature=0
quarkus.langchain4j.ollama.base-url=http://localhost:11434
# Health + Prometheus metrics (auto-exposed at /q/health/{live,ready} and /q/metrics)
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.smallrye-health.root-path=/q/health