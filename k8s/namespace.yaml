apiVersion: v1
kind: Namespace
metadata:
  name: unigevents
  labels:
    app.kubernetes.io/part-of: unigevents
    # ─────────────────────────────────────────────────────────────────────
    # PINFO-191 — Pod Security Admission.
    #
    # The "restricted" profile is the tightest of the three built-in PSA
    # tiers (privileged / baseline / restricted). It refuses any pod that:
    #   - runs as UID 0,
    #   - allows privilege escalation,
    #   - adds Linux capabilities other than NET_BIND_SERVICE,
    #   - uses non-default seccomp / AppArmor profiles,
    #   - mounts host paths,
    #   - uses hostNetwork / hostPID / hostIPC.
    #
    # All workloads here already comply since PINFO-180 (runAsNonRoot,
    # capabilities.drop ALL, seccompProfile RuntimeDefault). The label
    # turns that compliance into a hard guarantee: a future regression
    # (a dev adding a pod without securityContext) is rejected at
    # admission time instead of silently rolling out.
    #
    # cloudflared is the only pod with hostNetwork=true. Under
    # `restricted` it would be denied — so we keep `enforce` at
    # `baseline` (which permits hostNetwork) and use `audit` +
    # `warn` at `restricted` to surface anything else that drifts.
    # That gives us a 'cannot become root' floor without losing the
    # tunnel. Once cloudflared moves off hostNetwork (or away from
    # this namespace) we can promote `enforce` to `restricted`.
    # ─────────────────────────────────────────────────────────────────────
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
